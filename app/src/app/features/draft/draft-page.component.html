<div class="p-4 md:p-8">
  <app-header
    subtitle="Fight-Club"
    [logoLarge]="true"
    [showAdminBar]="true"
    [pnlAmount]="totalPnL()"
    (openSettings)="openSettingsModal()"
    (resetData)="resetAllData()"
  />

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-1 space-y-6">
      @if (isAdmin()) {
        <app-roster-form (addPlayer)="addPlayer($event)" />
      }

      <app-leaderboard-card [players]="players()" [isAdmin]="isAdmin()" (editPlayer)="editPlayer($event)" />

      <app-history-card
        [history]="history()"
        [isAdmin]="isAdmin()"
        (selectMatch)="openMatchDetail($event)"
        (closeSession)="closeSession()"
      />

      <app-sessions-card [sessions]="sessions()" [isAdmin]="isAdmin()" (selectSession)="openSessionDetail($event)" />
    </div>

    <div class="lg:col-span-2 space-y-6">
      @if (!activeMatch()) {
        <app-draft-board
          [players]="players()"
          [draftTeamA]="draft().teamA"
          [draftTeamB]="draft().teamB"
          [isAdmin]="isAdmin()"
          (draftChange)="onDraftChange($event)"
          (createMatch)="createMatch()"
        />
      } @else {
        <app-active-match-panel
          [match]="activeMatch()!"
          [isAdmin]="isAdmin()"
          (placeBet)="placeBet($event)"
          (cancelBet)="cancelActiveBet($event)"
          (resolveMatch)="resolveMatch($event)"
          (cancelMatch)="cancelMatch()"
        />
      }
    </div>
  </div>
</div>

@if (settingsModalOpen()) {
  <app-settings-modal [settings]="settings()" (close)="closeSettingsModal()" (save)="saveSettings($event)" />
}

@if (selectedSession(); as session) {
  <app-session-detail-modal
    [session]="session"
    [isAdmin]="isAdmin()"
    (close)="closeSessionDetail()"
    (selectMatch)="openMatchDetail($event)"
    (deleteSession)="deleteSession()"
  />
}

@if (selectedMatch(); as match) {
  <app-match-detail-modal
    [match]="match"
    [isAdmin]="isAdmin()"
    [isLiveMatch]="isSelectedMatchLive()"
    (close)="closeMatchDetail()"
    (togglePaid)="togglePaid($event)"
    (cancelMatch)="cancelHistoryMatch()"
  />
}
