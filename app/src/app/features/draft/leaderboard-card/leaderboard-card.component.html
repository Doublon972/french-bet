<div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-semibold text-white">🏆 Classement</h2>
    <a
      routerLink="/classement"
      class="text-xs bg-slate-700 hover:bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-bold transition shadow-md flex items-center gap-2"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
      Détails
    </a>
  </div>
  <ul class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
    @for (p of ranked(); track p.id) {
      <li class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 group">
        <div class="flex items-center gap-2">
          <span class="w-6 text-center" [class]="rankColor(p.rank)">#{{ p.rank }}</span>
          <div class="font-semibold text-slate-200">{{ p.name }}</div>
          @if (isAdmin) {
            <button
              (click)="editPlayer.emit(p)"
              class="text-slate-500 hover:text-indigo-400 ml-2 transition"
              title="Éditer le nom"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
          }
        </div>
        <div class="flex flex-col items-end">
          <span class="text-sm font-bold text-indigo-400">{{ p.roundedElo }} <span class="text-xs text-slate-500 font-normal">pts</span></span>
          <span class="text-xs text-slate-500">{{ p.wins }}V - {{ p.losses }}D ({{ winrate(p) }}%)</span>
        </div>
      </li>
    }
  </ul>
</div>
