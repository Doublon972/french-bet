<ul class="space-y-3 overflow-y-auto pr-2 max-h-[350px]">
  @if (rows().length === 0) {
    <li class="text-slate-500 text-center text-sm italic py-4">Aucun match impliquant ce groupe</li>
  } @else {
    @for (row of rows(); track row.id) {
      <li
        class="p-3 rounded-xl border flex flex-col text-sm shadow-sm relative overflow-hidden transition-all hover:brightness-110"
        [class]="row.borderClass"
      >
        <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-700/50">
          <div class="flex items-center gap-2 text-xs font-bold text-slate-400">
            <span class="uppercase tracking-wider opacity-80">{{ row.dateStr }}</span>
          </div>
          <div class="text-sm tracking-wider uppercase">
            @switch (row.status) {
              @case ('victoire') {
                <span class="text-emerald-400 font-bold flex items-center gap-1"><span class="text-lg">✅</span> Victoire</span>
              }
              @case ('defaite') {
                <span class="text-red-400 font-bold flex items-center gap-1"><span class="text-lg">❌</span> Défaite</span>
              }
              @case ('guerre') {
                <span class="text-amber-400 font-bold flex items-center gap-1"><span class="text-lg">⚔️</span> Guerre Civile</span>
              }
            }
          </div>
        </div>

        <div class="flex justify-between items-center gap-2 w-full">
          <div class="w-[45%] text-right text-xs leading-relaxed break-words" [class]="row.teamAClass" [innerHTML]="row.teamAHtml"></div>
          <div class="w-[10%] flex justify-center shrink-0">
            <span class="text-[9px] font-black text-slate-600 bg-slate-900 px-1.5 py-0.5 rounded shadow-inner">VS</span>
          </div>
          <div class="w-[45%] text-left text-xs leading-relaxed break-words" [class]="row.teamBClass" [innerHTML]="row.teamBHtml"></div>
        </div>
      </li>
    }
  }
</ul>
