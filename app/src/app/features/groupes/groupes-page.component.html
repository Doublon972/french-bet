<div class="h-screen flex flex-col p-4 md:p-8">
  <div class="shrink-0">
    <app-header
      subtitle="Données groupes"
      [navLinks]="[
        { label: '👤 Classement Individuel', path: '/classement' },
        { label: 'Retour à la Draft', path: '/', variant: 'plain', showBackIcon: true },
      ]"
    />
  </div>

  <div class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-4 gap-8 flex-grow h-0 pb-4">
    <app-group-leaderboard
      class="lg:col-span-1 bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm flex flex-col h-full overflow-hidden"
      [groups]="rankedGroups()"
      [selectedGroupId]="selectedGroupId()"
      (select)="selectGroup($event)"
    />

    <div class="lg:col-span-3 bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm flex flex-col h-full overflow-hidden relative">
      @if (selectedGroup(); as g) {
        <app-group-detail-panel [group]="g" [totalGroupCount]="rankedGroups().length" [allMatches]="allMatches()" />
      } @else {
        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 z-10 bg-slate-800/80 backdrop-blur-sm rounded-2xl">
          <svg class="w-16 h-16 mb-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          <p class="text-lg font-semibold">Sélectionnez un groupe pour voir ses statistiques</p>
        </div>
      }
    </div>
  </div>
</div>
