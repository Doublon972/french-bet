<h2 class="text-lg font-semibold mb-4 text-white shrink-0">🚩 Classement Groupes</h2>
<div class="relative mb-4 shrink-0">
  <input
    type="text"
    [value]="searchTerm()"
    (input)="onSearchInput($event)"
    placeholder="Rechercher un groupe..."
    class="w-full p-2.5 pl-9 rounded-xl bg-slate-900 border border-slate-700 text-sm text-white focus:outline-none focus:border-amber-500"
  />
  <svg class="w-4 h-4 text-slate-500 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
</div>
<ul class="space-y-3 overflow-y-auto pr-2 flex-grow h-0">
  @for (g of filtered(); track g.id) {
    <li
      (click)="select.emit(g.id)"
      class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 cursor-pointer transition"
      [class]="g.id === selectedGroupId ? 'selected-group' : 'hover:border-slate-500 hover:bg-slate-800'"
    >
      <div class="flex items-center gap-3 w-3/4">
        <span class="w-6 shrink-0 text-center text-sm" [class]="rankColor(g.rank)">#{{ g.rank }}</span>
        <div class="truncate">
          <div class="font-bold text-slate-200 truncate">{{ g.name }}</div>
          <div class="text-[10px] text-slate-500">{{ g.members.length }} membres</div>
        </div>
      </div>
      <div class="text-sm shrink-0 font-bold text-amber-500">
        {{ g.roundedAvgElo }} <span class="text-[10px] text-slate-500 font-normal">pts</span>
      </div>
    </li>
  }
</ul>
