<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena - Draft & Paris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Scrollbar custom pour un look plus clean */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-white mb-8 tracking-tight">⚔️ ARENA <span class="text-slate-500 font-light">| Live Draft</span></h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm">
                    <h2 class="text-lg font-semibold mb-4 text-emerald-400 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                        Nouveau Combattant
                    </h2>
                    <div class="flex gap-2">
                        <input type="text" id="playerName" placeholder="Pseudo..." class="w-full p-3 rounded-xl bg-slate-900/50 text-white border border-slate-700 focus:outline-none focus:border-emerald-500 transition">
                        <button onclick="window.addPlayer()" class="bg-emerald-500 hover:bg-emerald-600 px-5 rounded-xl font-bold transition shadow-lg shadow-emerald-500/20 text-white">+</button>
                    </div>
                </div>

                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm">
                    <h2 class="text-lg font-semibold mb-4 text-white flex items-center justify-between">
                        <span>🏆 Classement</span>
                        <span class="text-xs font-normal text-slate-400 bg-slate-900 px-2 py-1 rounded-md">Live (Firebase)</span>
                    </h2>
                    <ul id="leaderboard" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                        </ul>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm">
                    <h2 class="text-xl font-bold mb-6 text-center text-white">Salle de Draft</h2>
                    
                    <div class="grid grid-cols-3 gap-4 text-sm font-medium text-slate-400 mb-2 text-center">
                        <div>Équipe Bleue</div>
                        <div>Joueurs Disponibles</div>
                        <div>Équipe Rouge</div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 h-[300px]">
                        <div id="draftTeamA" class="bg-blue-900/20 border-2 border-dashed border-blue-500/30 rounded-xl p-3 overflow-y-auto space-y-2"></div>
                        
                        <div id="draftAvailable" class="bg-slate-900/50 border border-slate-700 rounded-xl p-3 overflow-y-auto space-y-2"></div>
                        
                        <div id="draftTeamB" class="bg-red-900/20 border-2 border-dashed border-red-500/30 rounded-xl p-3 overflow-y-auto space-y-2"></div>
                    </div>

                    <div class="mt-6 text-center">
                        <button onclick="window.prepareMatch()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-indigo-500/30 w-full md:w-auto">
                            Verrouiller la Draft & Analyser
                        </button>
                    </div>
                </div>

                <div id="matchSection" class="hidden bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm fade-in">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                        
                        <div class="w-full md:w-5/12 bg-blue-900/30 p-4 rounded-xl border border-blue-500/30 text-center">
                            <h3 class="text-blue-400 font-bold mb-2">Équipe Bleue</h3>
                            <div id="displayTeamA" class="text-sm text-slate-300 mb-4 h-10"></div>
                            <div class="text-3xl font-black text-white mb-4" id="oddsA">x1.00</div>
                            <button onclick="window.resolveMatch('A')" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg font-bold transition">Victoire Bleue</button>
                        </div>

                        <div class="w-full md:w-2/12 text-center">
                            <div class="text-2xl font-black text-slate-600 italic">VS</div>
                            <div id="winProbA" class="text-xs text-blue-400 mt-2">50%</div>
                            <div id="winProbB" class="text-xs text-red-400">50%</div>
                        </div>

                        <div class="w-full md:w-5/12 bg-red-900/30 p-4 rounded-xl border border-red-500/30 text-center">
                            <h3 class="text-red-400 font-bold mb-2">Équipe Rouge</h3>
                            <div id="displayTeamB" class="text-sm text-slate-300 mb-4 h-10"></div>
                            <div class="text-3xl font-black text-white mb-4" id="oddsB">x1.00</div>
                            <button onclick="window.resolveMatch('B')" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg font-bold transition">Victoire Rouge</button>
                        </div>

                    </div>
                    <button onclick="window.cancelMatch()" class="mt-4 w-full text-center text-sm text-slate-500 hover:text-slate-300 transition">Annuler le match</button>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCgiapnMdkb8FSF68Od6D4l0eVFAqZh_yI",
            authDomain: "french-bet.firebaseapp.com",
            databaseURL: "https://french-bet-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "french-bet",
            storageBucket: "french-bet.firebasestorage.app",
            messagingSenderId: "136214016140",
            appId: "1:136214016140:web:6ab1c7f494df6c200c0ba9",
            measurementId: "G-MXF7B7Y3TG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const playersRef = ref(db, 'players');

        let players = [];
        let draftA = [];
        let draftB = [];
        let currentMatch = null;

        // Écouteur en temps réel (Remplace le localStorage)
        onValue(playersRef, (snapshot) => {
            const data = snapshot.val();
            players = [];
            if (data) {
                // Conversion de l'objet Firebase en tableau
                for (let key in data) {
                    players.push({ id: key, ...data[key] });
                }
            }
            // Nettoyage de la draft si des joueurs ont été supprimés/modifiés ailleurs
            draftA = draftA.filter(id => players.find(p => p.id === id));
            draftB = draftB.filter(id => players.find(p => p.id === id));
            render();
        });

        // 1. Ajouter un joueur (Pousse dans Firebase)
        window.addPlayer = () => {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim();
            if (name === '') return;

            const newPlayerRef = push(playersRef);
            set(newPlayerRef, {
                name: name,
                elo: 1000,
                wins: 0,
                losses: 0
            });
            nameInput.value = '';
        };

        // 2. Gestion de la Draft
        window.moveToA = (id) => { draftA.push(id); renderDraft(); };
        window.moveToB = (id) => { draftB.push(id); renderDraft(); };
        window.removeFromDraft = (id) => { 
            draftA = draftA.filter(playerId => playerId !== id);
            draftB = draftB.filter(playerId => playerId !== id);
            renderDraft(); 
        };

        // 3. Logique Elo & Match
        function getWinProbability(elo1, elo2) {
            return 1 / (1 + Math.pow(10, (elo2 - elo1) / 400));
        }

        window.prepareMatch = () => {
            if (draftA.length === 0 || draftB.length === 0) {
                alert("Il faut au moins un joueur dans chaque équipe.");
                return;
            }

            const teamA = players.filter(p => draftA.includes(p.id));
            const teamB = players.filter(p => draftB.includes(p.id));

            const eloA = teamA.reduce((sum, p) => sum + p.elo, 0) / teamA.length;
            const eloB = teamB.reduce((sum, p) => sum + p.elo, 0) / teamB.length;

            const probA = getWinProbability(eloA, eloB);
            const probB = 1 - probA;

            const oddsA = Math.min(1 / probA, 20).toFixed(2);
            const oddsB = Math.min(1 / probB, 20).toFixed(2);

            currentMatch = { teamA, teamB, probA, probB };

            // UI
            document.getElementById('matchSection').classList.remove('hidden');
            document.getElementById('displayTeamA').innerText = teamA.map(p => p.name).join(' & ');
            document.getElementById('displayTeamB').innerText = teamB.map(p => p.name).join(' & ');
            document.getElementById('oddsA').innerText = `x${oddsA}`;
            document.getElementById('oddsB').innerText = `x${oddsB}`;
            document.getElementById('winProbA').innerText = `${(probA * 100).toFixed(0)}% de chance`;
            document.getElementById('winProbB').innerText = `${(probB * 100).toFixed(0)}% de chance`;
            
            // Scroll doux vers le match
            document.getElementById('matchSection').scrollIntoView({ behavior: 'smooth' });
        };

        window.cancelMatch = () => {
            currentMatch = null;
            document.getElementById('matchSection').classList.add('hidden');
        };

        window.resolveMatch = (winnerStr) => {
            if (!currentMatch) return;
            const K = 32;
            const { teamA, teamB, probA, probB } = currentMatch;

            const scoreA = winnerStr === 'A' ? 1 : 0;
            const scoreB = winnerStr === 'B' ? 1 : 0;

            const eloChangeA = K * (scoreA - probA);
            const eloChangeB = K * (scoreB - probB);

            // Préparation des mises à jour par lot pour Firebase
            const updates = {};

            teamA.forEach(p => {
                updates[`players/${p.id}/elo`] = p.elo + eloChangeA;
                updates[`players/${p.id}/wins`] = scoreA === 1 ? p.wins + 1 : p.wins;
                updates[`players/${p.id}/losses`] = scoreA === 0 ? p.losses + 1 : p.losses;
            });

            teamB.forEach(p => {
                updates[`players/${p.id}/elo`] = p.elo + eloChangeB;
                updates[`players/${p.id}/wins`] = scoreB === 1 ? p.wins + 1 : p.wins;
                updates[`players/${p.id}/losses`] = scoreB === 0 ? p.losses + 1 : p.losses;
            });

            // Envoi de la transaction globale à Firebase
            update(ref(db), updates).then(() => {
                draftA = [];
                draftB = [];
                window.cancelMatch();
                renderDraft();
            });
        };

        // 4. Génération de l'interface
        function getInitials(name) {
            return name.substring(0, 2).toUpperCase();
        }

        function createPlayerCard(p, context) {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between bg-slate-800 p-2 rounded-lg fade-in border border-slate-700 shadow-sm";
            
            const leftSide = `
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-300">
                        ${getInitials(p.name)}
                    </div>
                    <div>
                        <div class="text-sm font-bold">${p.name}</div>
                        <div class="text-xs text-slate-400">⭐ ${Math.round(p.elo)}</div>
                    </div>
                </div>
            `;

            let actionBtn = '';
            if (context === 'available') {
                actionBtn = `
                    <div class="flex gap-1">
                        <button onclick="window.moveToA('${p.id}')" class="p-1.5 text-blue-400 hover:bg-blue-900/50 rounded transition" title="Bleu">◀</button>
                        <button onclick="window.moveToB('${p.id}')" class="p-1.5 text-red-400 hover:bg-red-900/50 rounded transition" title="Rouge">▶</button>
                    </div>`;
            } else {
                actionBtn = `<button onclick="window.removeFromDraft('${p.id}')" class="p-1 text-slate-500 hover:text-white rounded transition">✕</button>`;
            }

            div.innerHTML = leftSide + actionBtn;
            return div;
        }

        function renderDraft() {
            const availableContainer = document.getElementById('draftAvailable');
            const teamAContainer = document.getElementById('draftTeamA');
            const teamBContainer = document.getElementById('draftTeamB');

            availableContainer.innerHTML = '';
            teamAContainer.innerHTML = '';
            teamBContainer.innerHTML = '';

            players.forEach(p => {
                if (draftA.includes(p.id)) {
                    teamAContainer.appendChild(createPlayerCard(p, 'teamA'));
                } else if (draftB.includes(p.id)) {
                    teamBContainer.appendChild(createPlayerCard(p, 'teamB'));
                } else {
                    availableContainer.appendChild(createPlayerCard(p, 'available'));
                }
            });
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderboard');
            list.innerHTML = '';
            
            const sortedPlayers = [...players].sort((a, b) => b.elo - a.elo);

            sortedPlayers.forEach((p, index) => {
                const totalGames = p.wins + p.losses;
                const winrate = totalGames === 0 ? 0 : Math.round((p.wins / totalGames) * 100);
                
                let rankColor = "text-slate-400";
                if(index === 0) rankColor = "text-yellow-400 font-bold";
                if(index === 1) rankColor = "text-slate-300 font-bold";
                if(index === 2) rankColor = "text-amber-600 font-bold";

                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 hover:border-slate-600 transition";
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-6 text-center ${rankColor}">#${index + 1}</span>
                        <div class="font-semibold text-slate-200">${p.name}</div>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-sm font-bold text-indigo-400">${Math.round(p.elo)} <span class="text-xs text-slate-500 font-normal">pts</span></span>
                        <span class="text-xs text-slate-500">${p.wins}V - ${p.losses}D (${winrate}%)</span>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function render() {
            renderLeaderboard();
            renderDraft();
        }
    </script>
</body>
</html>
