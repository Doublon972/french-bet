<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arena - Gestion de Paris Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-white text-center">⚔️ Arena - Registre de Paris</h1>

        <!-- Enregistrement Pari (Admin) -->
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-lg font-bold mb-4 text-emerald-400">Ajouter un pari (Admin)</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="betName" placeholder="Parieur (ex: Pari 1)" class="p-2 rounded bg-slate-900 border border-slate-700">
                <input type="number" id="betAmount" placeholder="Montant ($)" class="p-2 rounded bg-slate-900 border border-slate-700">
                <select id="betTeam" class="p-2 rounded bg-slate-900 border border-slate-700">
                    <option value="Bleu">Équipe Bleu</option>
                    <option value="Rouge">Équipe Rouge</option>
                </select>
                <button onclick="window.addBet()" class="bg-emerald-600 hover:bg-emerald-700 rounded font-bold">Ajouter</button>
            </div>
        </div>

        <!-- Liste des Paris -->
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-lg font-bold mb-4">Paris enregistrés</h2>
            <div id="betsList" class="space-y-2">
                <!-- Liste générée en temps réel -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgiapnMdkb8FSF68Od6D4l0eVFAqZh_yI",
            authDomain: "french-bet.firebaseapp.com",
            databaseURL: "https://french-bet-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "french-bet",
            storageBucket: "french-bet.firebasestorage.app",
            messagingSenderId: "136214016140",
            appId: "1:136214016140:web:6ab1c7f494df6c200c0ba9",
            measurementId: "G-MXF7B7Y3TG"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        const betsRef = ref(db, 'registre_paris');

        window.addBet = () => {
            const name = document.getElementById('betName').value;
            const amount = document.getElementById('betAmount').value;
            const team = document.getElementById('betTeam').value;
            
            if(!name || !amount) return;

            push(betsRef, { name, amount, team, timestamp: Date.now() });
            
            // Clear inputs
            document.getElementById('betName').value = '';
            document.getElementById('betAmount').value = '';
        };

        onValue(betsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('betsList');
            list.innerHTML = '';
            
            if(data) {
                Object.values(data).forEach(b => {
                    const color = b.team === 'Bleu' ? 'text-blue-400' : 'text-red-400';
                    list.innerHTML += `
                        <div class="flex justify-between bg-slate-900 p-3 rounded border border-slate-700">
                            <span class="font-bold">${b.name}</span>
                            <span class="${color} font-bold">${b.amount}$ sur ${b.team}</span>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
