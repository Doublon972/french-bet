<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaFrench - Détails du Classement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; /* Empêche le scroll sur toute la page */ }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .selected-player { border-color: #6366f1 !important; background-color: rgba(30, 41, 59, 0.8) !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 h-screen p-4 md:p-8 flex flex-col">

    <!-- Header (Ne scrolle jamais) -->
    <div class="max-w-7xl mx-auto w-full shrink-0 mb-6 flex justify-between items-center">
        <h1 class="text-3xl font-bold text-white tracking-tight flex items-center gap-4">
            <img src="french.png" alt="Logo La French" class="w-16 h-16 object-contain drop-shadow-xl" onerror="this.style.display='none'">
            LAFRENCH <span class="text-slate-500 font-light">| Données des enculés</span>
        </h1>
        
        <a href="index.html" class="bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl transition font-bold flex items-center gap-2 shadow-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Retour
        </a>
    </div>

    <!-- Conteneur principal (Prend la hauteur restante) -->
    <div class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-4 gap-8 flex-grow h-0 pb-4">
        
        <!-- Colonne Classement -->
        <div class="lg:col-span-1 bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm flex flex-col h-full overflow-hidden">
            <h2 class="text-lg font-semibold mb-4 text-white shrink-0">🏆 Classement</h2>
            <div class="relative mb-4 shrink-0">
                <input type="text" id="searchInput" oninput="window.filterLeaderboard(this.value)" placeholder="Rechercher..." class="w-full p-2.5 pl-9 rounded-xl bg-slate-900 border border-slate-700 text-sm text-white focus:outline-none focus:border-indigo-500">
                <svg class="w-4 h-4 text-slate-500 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <!-- La liste avec le scroll interne -->
            <ul id="fullLeaderboard" class="space-y-3 overflow-y-auto pr-2 flex-grow h-0">
                <!-- Rempli par JS -->
            </ul>
        </div>

        <!-- Colonne Détails Joueur -->
        <div class="lg:col-span-3 bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-xl backdrop-blur-sm flex flex-col h-full overflow-hidden relative">
            
            <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 z-10 bg-slate-800/80 backdrop-blur-sm rounded-2xl">
                <svg class="w-16 h-16 mb-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                <p class="text-lg font-semibold">Sélectionnez un joueur pour voir ses statistiques</p>
            </div>

            <div id="playerDashboard" class="hidden flex flex-col h-full fade-in overflow-y-auto pr-2">
                <!-- En-tête -->
                <div class="flex justify-between items-end mb-6 pb-6 border-b border-slate-700 shrink-0">
                    <div class="flex items-center gap-4">
                        <div id="pInitial" class="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center text-2xl font-black text-white shadow-lg shadow-indigo-500/30 shrink-0"></div>
                        <div>
                            <h2 id="pName" class="text-3xl font-black text-white tracking-tight"></h2>
                            <p id="pRank" class="text-indigo-400 font-semibold"></p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-black text-white" id="pElo"></div>
                        <div class="text-sm text-slate-400 uppercase tracking-widest font-bold">Points Elo</div>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="grid grid-cols-3 gap-4 mb-6 shrink-0">
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700/50">
                        <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Total Matchs</div>
                        <div class="text-2xl font-black text-white" id="pTotalGames">0</div>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700/50">
                        <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Taux de victoire</div>
                        <div class="text-2xl font-black text-emerald-400" id="pWinrate">0%</div>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700/50">
                        <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Série actuelle</div>
                        <div class="text-2xl font-black" id="pStreak">-</div>
                    </div>
                </div>

                <!-- Graphique & Historique -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow min-h-[300px]">
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700/50 flex flex-col h-full overflow-hidden">
                        <h3 class="text-sm font-bold text-slate-300 mb-4 shrink-0">Évolution de l'Elo</h3>
                        <div class="relative flex-grow h-0 w-full">
                            <canvas id="eloChart"></canvas>
                        </div>
                    </div>
                    
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700/50 flex flex-col h-full overflow-hidden">
                        <h3 class="text-sm font-bold text-slate-300 mb-4 shrink-0">Historique Personnel</h3>
                        <ul id="pMatchHistory" class="space-y-3 overflow-y-auto flex-grow h-0 pr-2"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgiapnMdkb8FSF68Od6D4l0eVFAqZh_yI",
            authDomain: "french-bet.firebaseapp.com",
            databaseURL: "https://french-bet-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "french-bet",
            storageBucket: "french-bet.firebasestorage.app",
            messagingSenderId: "136214016140",
            appId: "1:136214016140:web:6ab1c7f494df6c200c0ba9",
            measurementId: "G-MXF7B7Y3TG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let players = [];
        let sortedPlayers = [];
        let allMatches = [];
        let chartInstance = null;
        let selectedPlayerId = null;
        let searchTerm = "";

        onValue(ref(db, 'players'), (snapshot) => {
            const data = snapshot.val();
            players = [];
            if (data) {
                for (let key in data) {
                    if (data[key] && typeof data[key] === 'object') {
                        players.push({ id: key, ...data[key] });
                    }
                }
            }
            buildRanking();
            if(selectedPlayerId) window.selectPlayer(selectedPlayerId);
        });

        function fetchAllMatches() {
            let live = [];
            let archives = [];
            let isLiveReady = false;
            let isArchivesReady = false;

            const checkAndProcess = () => {
                if(isLiveReady && isArchivesReady) {
                    allMatches = [...archives, ...live].sort((a,b) => a.timestamp - b.timestamp);
                    if(selectedPlayerId) window.selectPlayer(selectedPlayerId);
                }
            };

            onValue(ref(db, 'history'), (snapshot) => {
                const data = snapshot.val();
                live = [];
                if (data) {
                    for (let key in data) {
                        if (data[key] && data[key].teamA_names) live.push({ id: key, ...data[key] });
                    }
                }
                isLiveReady = true;
                checkAndProcess();
            });

            onValue(ref(db, 'sessions'), (snapshot) => {
                const data = snapshot.val();
                archives = [];
                if (data) {
                    for (let sKey in data) {
                        const session = data[sKey];
                        if (session && session.matches) {
                            for (let mKey in session.matches) {
                                if(session.matches[mKey] && typeof session.matches[mKey] === 'object') {
                                    archives.push({ id: mKey, ...session.matches[mKey] });
                                }
                            }
                        }
                    }
                }
                isArchivesReady = true;
                checkAndProcess();
            });
        }
        fetchAllMatches();

        function buildRanking() {
            sortedPlayers = [...players].sort((a, b) => b.elo - a.elo);
            let currentRank = 1;
            let previousElo = null;

            sortedPlayers.forEach((p) => {
                const roundedElo = Math.round(p.elo);
                if (previousElo !== null && roundedElo < previousElo) {
                    currentRank++;
                }
                previousElo = roundedElo;
                p.rank = currentRank;
            });

            renderLeaderboard();
        }

        window.filterLeaderboard = (val) => {
            searchTerm = val.toLowerCase();
            renderLeaderboard();
        };

        function renderLeaderboard() {
            const list = document.getElementById('fullLeaderboard');
            list.innerHTML = '';

            sortedPlayers.forEach((p) => {
                if (!p.name.toLowerCase().includes(searchTerm)) return;

                const totalGames = p.wins + p.losses;
                const winrate = totalGames === 0 ? 0 : Math.round((p.wins / totalGames) * 100);
                
                let rankColor = "text-slate-400";
                if(p.rank === 1) rankColor = "text-yellow-400 font-black";
                if(p.rank === 2) rankColor = "text-slate-300 font-bold";
                if(p.rank === 3) rankColor = "text-amber-600 font-bold";

                const isSelected = p.id === selectedPlayerId ? "selected-player" : "hover:border-slate-500 hover:bg-slate-800";

                const li = document.createElement('li');
                li.className = `flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 cursor-pointer transition ${isSelected}`;
                li.onclick = () => window.selectPlayer(p.id);
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 w-3/4">
                        <span class="w-6 shrink-0 text-center text-sm ${rankColor}">#${p.rank}</span>
                        <div class="truncate">
                            <div class="font-semibold text-slate-200 truncate">${p.name}</div>
                            <div class="text-[10px] text-slate-500">${totalGames} matchs (${winrate}%)</div>
                        </div>
                    </div>
                    <div class="text-sm shrink-0 font-bold text-indigo-400">
                        ${Math.round(p.elo)} <span class="text-[10px] text-slate-500 font-normal">pts</span>
                    </div>`;
                list.appendChild(li);
            });
        }

        window.selectPlayer = (id) => {
            selectedPlayerId = id;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('playerDashboard').classList.remove('hidden');
            renderLeaderboard();

            const player = sortedPlayers.find(p => p.id === id);
            if(!player) return;

            document.getElementById('pName').innerText = player.name;
            document.getElementById('pInitial').innerText = player.name.substring(0,2).toUpperCase();
            document.getElementById('pElo').innerText = Math.round(player.elo);
            
            let rankText = `${player.rank}${player.rank === 1 ? 'er' : 'ème'} sur ${players.length}`;
            document.getElementById('pRank').innerText = rankText;

            const total = player.wins + player.losses;
            const winrate = total === 0 ? 0 : Math.round((player.wins / total) * 100);
            document.getElementById('pTotalGames').innerText = total;
            document.getElementById('pWinrate').innerText = `${winrate}%`;

            const playerMatches = allMatches.filter(m => {
                const inTeamAIds = m.teamA_ids && m.teamA_ids.includes(id);
                const inTeamBIds = m.teamB_ids && m.teamB_ids.includes(id);
                const inTeamANames = !m.teamA_ids && m.teamA_names && m.teamA_names.includes(player.name);
                const inTeamBNames = !m.teamB_ids && m.teamB_names && m.teamB_names.includes(player.name);
                return inTeamAIds || inTeamBIds || inTeamANames || inTeamBNames;
            });

            const reversedMatches = [...playerMatches].reverse();

            // Série (Streak)
            let streak = 0;
            let currentStatus = null; 
            
            for(let m of reversedMatches) {
                const isTeamA = (m.teamA_ids && m.teamA_ids.includes(id)) || (!m.teamA_ids && m.teamA_names && m.teamA_names.includes(player.name));
                const isWin = (isTeamA && m.winner === 'A') || (!isTeamA && m.winner === 'B');
                const status = isWin ? 'W' : 'L';

                if(currentStatus === null) currentStatus = status;
                if(status === currentStatus) streak++;
                else break;
            }

            const streakEl = document.getElementById('pStreak');
            if(streak === 0) {
                streakEl.innerHTML = '<span class="text-slate-500">-</span>';
            } else if (currentStatus === 'W') {
                streakEl.innerHTML = `<span class="text-emerald-400">${streak} Victoire${streak>1?'s':''} 🔥</span>`;
            } else {
                streakEl.innerHTML = `<span class="text-red-400">${streak} Défaite${streak>1?'s':''} 🧊</span>`;
            }

            // Courbe Elo 
            let currentEloForChart = player.elo;
            let chartData = [{ x: 'Actuel', y: Math.round(currentEloForChart) }];

            reversedMatches.forEach((m, index) => {
                let delta = 0;
                const isTeamA = (m.teamA_ids && m.teamA_ids.includes(id)) || (!m.teamA_ids && m.teamA_names && m.teamA_names.includes(player.name));
                const isWin = (isTeamA && m.winner === 'A') || (!isTeamA && m.winner === 'B');

                if (m.eloChanges && m.eloChanges[id] !== undefined) {
                    delta = m.eloChanges[id];
                } else {
                    delta = isWin ? 16 : -16; 
                }
                
                currentEloForChart -= delta;
                
                const dateObj = new Date(m.timestamp);
                const dateStr = `${dateObj.getDate()}/${dateObj.getMonth()+1}`;
                chartData.push({ x: dateStr, y: Math.round(currentEloForChart) });
            });

            chartData.reverse();

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('eloChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(d => d.x),
                    datasets: [{
                        label: 'Points Elo',
                        data: chartData.map(d => d.y),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#818cf8',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#6366f1',
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#cbd5e1',
                            bodyColor: '#fff',
                            bodyFont: { weight: 'bold' },
                            borderColor: '#334155',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(51, 65, 85, 0.5)', drawBorder: false },
                            ticks: { color: '#64748b', font: {family: 'Inter'} }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#64748b', font: {family: 'Inter'}, maxTicksLimit: 7 }
                        }
                    }
                }
            });

            // Historique texte
            const historyList = document.getElementById('pMatchHistory');
            historyList.innerHTML = '';

            if (reversedMatches.length === 0) {
                historyList.innerHTML = '<li class="text-slate-500 text-center text-sm italic py-4">Aucun match joué</li>';
            } else {
                reversedMatches.forEach(m => {
                    const isTeamA = (m.teamA_ids && m.teamA_ids.includes(id)) || (!m.teamA_ids && m.teamA_names && m.teamA_names.includes(player.name));
                    const isWin = (isTeamA && m.winner === 'A') || (!isTeamA && m.winner === 'B');
                    
                    const borderCol = isWin ? 'border-emerald-500/30 bg-emerald-900/10' : 'border-red-500/30 bg-red-900/10';
                    const icon = isWin ? '✅' : '❌';
                    const dateStr = new Date(m.timestamp).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });

                    let eloTxt = '';
                    if(m.eloChanges && m.eloChanges[id] !== undefined) {
                        const delta = m.eloChanges[id];
                        eloTxt = delta > 0 ? `<span class="text-emerald-400 font-bold">+${Math.round(delta)}</span>` : `<span class="text-red-400 font-bold">${Math.round(delta)}</span>`;
                    } else {
                        const delta = isWin ? 16 : -16;
                        eloTxt = delta > 0 ? `<span class="text-emerald-400 font-bold">~+${delta}</span>` : `<span class="text-red-400 font-bold">~${delta}</span>`;
                    }

                    // Formatage en "badge" pour faire ressortir le joueur sélectionné
                    const highlightBadge = `<span class="inline-block bg-indigo-500/30 text-white font-black px-1.5 py-0.5 rounded-md border border-indigo-500/50 shadow-sm mx-0.5">${player.name}</span>`;
                    
                    const formatTeam = (teamStr) => {
                        if (!teamStr) return '';
                        return teamStr.split(', ').map(n => n === player.name ? highlightBadge : n).join(', ');
                    };

                    const teamAHTML = formatTeam(m.teamA_names);
                    const teamBHTML = formatTeam(m.teamB_names);

                    const li = document.createElement('li');
                    li.className = `p-3 rounded-xl border ${borderCol} flex flex-col text-sm shadow-sm relative overflow-hidden transition-all hover:bg-slate-800/30`;
                    
                    li.innerHTML = `
                        <!-- Ligne du haut : Date, Icône et Élo -->
                        <div class="flex justify-between items-center mb-2 pb-2 border-b ${isWin ? 'border-emerald-500/20' : 'border-red-500/20'}">
                            <div class="flex items-center gap-2 text-xs font-bold text-slate-400">
                                <span class="text-base">${icon}</span>
                                <span class="uppercase tracking-wider opacity-80">${dateStr}</span>
                            </div>
                            <div class="text-sm">${eloTxt}</div>
                        </div>
                        
                        <!-- Ligne du bas : Équipes avec wrapping autorisé -->
                        <div class="flex justify-between items-center gap-2 w-full">
                            <div class="w-[45%] text-right ${m.winner === 'A' ? 'text-slate-200' : 'text-slate-500'} text-xs leading-relaxed break-words">
                                ${teamAHTML}
                            </div>
                            <div class="w-[10%] flex justify-center shrink-0">
                                <span class="text-[9px] font-black text-slate-600 bg-slate-900 px-1.5 py-0.5 rounded shadow-inner">VS</span>
                            </div>
                            <div class="w-[45%] text-left ${m.winner === 'B' ? 'text-slate-200' : 'text-slate-500'} text-xs leading-relaxed break-words">
                                ${teamBHTML}
                            </div>
                        </div>
                    `;
                    historyList.appendChild(li);
                });
            }
        };

    </script>
</body>
</html>
